services:
  postgres:
    image: postgres:16-alpine
    container_name: bdd-shop-postgres
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shopdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bdd-shop-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: bdd-shop-frontend
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres-data:
