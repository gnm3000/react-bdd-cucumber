name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run backend tests (BDD + API)
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (for backend API used by frontend BDD)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend runtime dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Run BDD tests
        working-directory: frontend
        run: |
          export BASE_URL=http://127.0.0.1:4173
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir ../backend &
          API_PID=$!
          pnpm exec vite preview &
          FRONT_PID=$!
          trap 'kill "$FRONT_PID" "$API_PID" 2>/dev/null || true' EXIT
          pnpm exec wait-on http-get://127.0.0.1:8000/health -t 60000
          pnpm exec wait-on http-get://127.0.0.1:4173 -t 60000
          pnpm run test:bdd

      - name: Upload cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-cucumber-report
          path: frontend/reports/
