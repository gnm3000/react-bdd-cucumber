name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-unit:
    name: Backend unit + BDD domain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest-bdd domain tests without HTTP backend
        working-directory: backend
        run: pytest tests/features tests/steps -v

  frontend-unit:
    name: Frontend build + BDD with mocked API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Verify generated SDK has no drift
        working-directory: frontend
        run: |
          pnpm run generate:sdk
          git diff --exit-code src/generated/shop-sdk

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Run cucumber-js with mocked API
        working-directory: frontend
        run: |
          export BASE_URL=http://127.0.0.1:4173
          pnpm exec vite preview --host 127.0.0.1 --port 4173 &
          FRONT_PID=$!
          trap 'kill "$FRONT_PID" 2>/dev/null || true' EXIT
          pnpm exec wait-on http-get://127.0.0.1:4173 -t 60000
          pnpm run test:bdd

      - name: Upload cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-cucumber-report
          path: frontend/reports/

  integration:
    name: API contract + E2E with real stack
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Schemathesis
        run: |
          python -m pip install --upgrade pip
          pip install schemathesis

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start test stack with deterministic BDD fixtures
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Wait for frontend HTTP proxy
        working-directory: frontend
        run: pnpm exec wait-on http-get://127.0.0.1:4173/health -t 60000

      - name: Verify fixtures loaded
        run: |
          docker compose -f docker-compose.test.yml exec -T postgres \
            psql -U shop_user -d shopdb \
            -c "SELECT id, name, price FROM products ORDER BY id;"

      - name: Run Schemathesis API contract tests
        run: |
          schemathesis run http://127.0.0.1:8000/openapi.json \
            --checks all \
            --phases=examples,coverage,fuzzing \
            --max-examples 50

      - name: Run Playwright E2E against real frontend and backend
        working-directory: frontend
        run: pnpm exec playwright test
        env:
          BASE_URL: http://127.0.0.1:4173

      - name: Show docker logs on failure
        if: failure()
        run: |
          echo "=== Backend ==="
          docker compose -f docker-compose.test.yml logs backend
          echo "=== Seed ==="
          docker compose -f docker-compose.test.yml logs seed
          echo "=== Frontend ==="
          docker compose -f docker-compose.test.yml logs frontend

      - name: Stop test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
